<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chat - Vercel AI</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            background-color: #1c1c1e;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 15px 20px;
            border-bottom: 1px solid #333333;
            font-size: 1.2em;
            font-weight: 600;
            text-align: center;
            color: #f0f0f0;
        }

        #chat-output {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .input-area {
            display: flex;
            padding: 15px 20px;
            border-top: 1px solid #333333;
            background-color: #2c2c2e;
            gap: 10px;
        }

        #user-input {
            flex-grow: 1;
            padding: 10px 15px;
            border: 1px solid #555555;
            border-radius: 8px;
            font-size: 1em;
            background-color: #48484a;
            color: #ffffff;
        }

        #user-input:focus {
            background-color: #555555;
            outline: none;
            border-color: #007aff;
        }

        #send-button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #007aff;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        #send-button:hover:not(:disabled) {
            background-color: #005bb5;
        }

        #send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
        }

        .user-message {
            background-color: #1e3a5f;
            color: #d1e7ff;
            margin-left: 20%;
            text-align: right;
        }

        .ai-message {
            background-color: #2c2c2e;
            border-left: 3px solid #007aff;
            color: #ffffff;
            margin-right: 20%;
        }

        .loading {
            background-color: #2c2c2e;
            color: #888888;
            font-style: italic;
        }

        .error {
            background-color: #3d1f1f;
            color: #ff6b6b;
        }

        .info {
            background-color: #1f3d2c;
            color: #6bffb6;
        }

        .timestamp {
            font-size: 0.75em;
            color: #888;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">🔥 Gemini Chat - Vercel Proxy</div>
    <div id="chat-output">
        <div class="message ai-message info">
            ✨ Connected via Vercel Serverless Function<br>
            <span class="timestamp">Ready to chat with Gemini 2.0 Flash</span>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask what is NBA...">
        <button id="send-button">Send</button>
    </div>
</div>

<script>
    // ✨ Your Vercel API Endpoint
    const CLOUD_FUNCTION_URL = "https://chat-kiytpbenr-6hs95xgg-4111s-projects.vercel.app/api/chat";

    const outputDiv = document.getElementById('chat-output');
    const userInput = document.getElementById('user-input');
    const sendButton = document.getElementById('send-button');

    const conversationHistory = [];
    let isProcessing = false;

    function displayMessage(text, isUser = false, type = 'message') {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;

        if (isUser) messageDiv.className += ' user-message';
        else messageDiv.className += ' ai-message';

        const formattedText = text.replace(/\n/g, '<br>');
        messageDiv.innerHTML = formattedText;

        const timestamp = new Date().toLocaleTimeString();
        const timeSpan = document.createElement('span');
        timeSpan.className = 'timestamp';
        timeSpan.textContent = timestamp;
        messageDiv.appendChild(timeSpan);

        outputDiv.appendChild(messageDiv);
        outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    function displayLoading() {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message loading';
        messageDiv.textContent = '⏳ Thinking...';
        outputDiv.appendChild(messageDiv);
        outputDiv.scrollTop = outputDiv.scrollHeight;
        return messageDiv;
    }

    async function callGeminiViaVercel(userMessage) {
        try {
            const contents = conversationHistory.map(msg => ({
                role: msg.role,
                parts: [{text: msg.text}],
            }));

            contents.push({
                role: "user",
                parts: [{text: userMessage}],
            });

            console.log("📤 Calling Vercel API:", CLOUD_FUNCTION_URL);

            const response = await fetch(CLOUD_FUNCTION_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    contents: contents,
                    generationConfig: {
                        maxOutputTokens: 1024,
                        temperature: 0.7,
                    },
                }),
            });

            console.log("📥 Response status:", response.status);

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || `HTTP ${response.status}`);
            }

            const aiResponse = data.candidates && data.candidates[0] &&
                data.candidates[0].content && data.candidates[0].content.parts &&
                data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text
                ? data.candidates[0].content.parts[0].text
                : "No response received";

            conversationHistory.push({role: "user", text: userMessage});
            conversationHistory.push({role: "model", text: aiResponse});

            if (conversationHistory.length > 20) {
                conversationHistory.splice(0, 2);
            }

            return aiResponse;
        } catch (error) {
            console.error("❌ Error:", error);
            throw error;
        }
    }

    async function sendMessage() {
        const userMessage = userInput.value.trim();
        if (!userMessage || isProcessing) return;

        displayMessage(userMessage, true);
        userInput.value = '';
        sendButton.disabled = true;
        isProcessing = true;

        const loadingDiv = displayLoading();

        try {
            const aiResponse = await callGeminiViaVercel(userMessage);
            loadingDiv.remove();
            displayMessage(aiResponse, false);
        } catch (error) {
            loadingDiv.remove();
            displayMessage(`❌ Error: ${error.message}`, false, 'error');
        } finally {
            sendButton.disabled = false;
            isProcessing = false;
            userInput.focus();
        }
    }

    sendButton.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !isProcessing) sendMessage();
    });

    userInput.focus();
    console.log("✅ Chat initialized - Vercel Endpoint:", CLOUD_FUNCTION_URL);
</script>

</body>
</html>

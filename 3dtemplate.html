<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethyr Architecture Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ensure body takes full screen and centers content */
        body {
            margin: 0;
            overflow: hidden; /* Hide scrollbars */
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); /* Dark abstract background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif; /* Use Inter font */
            color: #e0e0e0; /* Light text color */
            perspective: 1000px; /* Establish 3D perspective */
        }

        /* Container for the 3D layers */
        .aethyr-container {
            width: 80vmin; /* Responsive width */
            height: 80vmin; /* Responsive height */
            max-width: 600px; /* Max size */
            max-height: 600px;
            position: relative;
            transform-style: preserve-3d; /* Allow children to exist in 3D space */
            transform: rotateX(20deg) rotateY(-30deg); /* Initial slight rotation */
            transition: transform 1s ease-in-out; /* Smooth transition for container rotation */
        }

        /* Individual Layer Styling */
        .aethyr-layer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            border: 2px solid rgba(100, 149, 237, 0.5); /* Subtle blue border */
            border-radius: 10px; /* Rounded corners */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
            opacity: 0.8;
            transition: transform 0.8s ease-in-out, opacity 0.8s ease-in-out, box-shadow 0.5s ease; /* Smooth transitions */
            cursor: pointer; /* Indicate interactivity */
            backface-visibility: hidden; /* Prevent backface rendering issues */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); /* Initial shadow */
        }

        /* Specific Layer Colors and Initial Positions */
        .layer-omega {
            background: rgba(138, 43, 226, 0.3); /* BlueViolet */
            transform: translateZ(150px); /* Position further out */
            z-index: 5;
        }

        .layer-gamma3 {
            background: rgba(0, 191, 255, 0.3); /* DeepSkyBlue */
            transform: translateZ(100px); /* Position further out */
            z-index: 4;
        }

        .layer-gamma2 {
            background: rgba(50, 205, 50, 0.3); /* LimeGreen */
            transform: translateZ(50px); /* Position further out */
            z-index: 3;
        }

        .layer-aethyr1 {
            background: rgba(255, 140, 0, 0.3); /* DarkOrange */
            transform: translateZ(0px); /* Base layer */
            z-index: 2;
        }

         .layer-genesis {
            background: rgba(220, 20, 60, 0.3); /* Crimson */
            transform: translateZ(-50px); /* Position further back */
            z-index: 1;
        }

        /* Hover Effects */
        .aethyr-layer:hover {
            opacity: 1.0;
            box-shadow: 0 0 30px rgba(100, 149, 237, 0.8); /* Brighter shadow on hover */
        }

        /* Active/Focused Layer Effect */
        .aethyr-layer.is-active {
            opacity: 1.0;
            transform: translateZ(200px) scale(1.1); /* Bring forward and slightly enlarge */
            box-shadow: 0 0 40px rgba(100, 149, 237, 1.0), 0 0 60px rgba(100, 149, 237, 0.8); /* Intense glow */
            z-index: 10; /* Bring to front */
        }

        /* Effect on other layers when one is active */
        .aethyr-layer.is-inactive {
             opacity: 0.3; /* Fade out inactive layers */
             box-shadow: 0 0 10px rgba(0, 0, 0, 0.3); /* Reduce shadow */
        }

        /* Conceptual Data Flow Visualization (using pseudo-elements or generated content) */
        /* This is a simplified visual cue, not actual data transfer */
        .aethyr-layer::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none; /* Don't interfere with clicks */
            opacity: 0;
            transition: opacity 0.5s ease;
            /* Example of a radial gradient pulsing effect */
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
            animation: pulse 2s infinite ease-out; /* Conceptual pulse animation */
        }

        .aethyr-layer.is-active::before {
            opacity: 1; /* Show pulse effect on active layer */
        }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 0.5; }
            50% { transform: scale(1.0); opacity: 0.8; }
            100% { transform: scale(0.5); opacity: 0.5; }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .aethyr-container {
                width: 90vmin;
                height: 90vmin;
            }
            .aethyr-layer {
                font-size: 1em;
            }
             body {
                transform: perspective(800px) rotateX(25deg) rotateY(-20deg); /* Adjust initial rotation for smaller screens */
            }
             .aethyr-layer.is-active {
                 transform: translateZ(150px) scale(1.05); /* Less aggressive scale/translate on smaller screens */
             }
        }
    </style>
</head>
<body>

    <div class="aethyr-container" id="aethyrContainer">
        <div class="aethyr-layer layer-omega" data-layer="omega">
            vΩ-Omega Layer (ΔΣ7)
        </div>
        <div class="aethyr-layer layer-gamma3" data-layer="gamma3">
            vΓ.3-ΩΨ OverMind Ascendant
        </div>
        <div class="aethyr-layer layer-gamma2" data-layer="gamma2">
            vΓ.2-ΔΣ OverMind Evolved
        </div>
        <div class="aethyr-layer layer-aethyr1" data-layer="aethyr1">
            AETHYR-1 Core
        </div>
         <div class="aethyr-layer layer-genesis" data-layer="genesis">
            Genesis Input Layer
        </div>
    </div>

    <script>
        const container = document.getElementById('aethyrContainer');
        const layers = document.querySelectorAll('.aethyr-layer');

        layers.forEach(layer => {
            layer.addEventListener('click', () => {
                // Remove active/inactive classes from all layers
                layers.forEach(l => {
                    l.classList.remove('is-active');
                    l.classList.remove('is-inactive');
                });

                // Set the clicked layer as active
                layer.classList.add('is-active');

                // Set all other layers as inactive
                layers.forEach(l => {
                    if (l !== layer) {
                        l.classList.add('is-inactive');
                    }
                });

                // Optional: Rotate the container slightly to focus on the active layer
                // This is a simple example, more complex rotations could be added
                const layerData = layer.dataset.layer;
                let rotateX = 20;
                let rotateY = -30;

                switch(layerData) {
                    case 'omega':
                        rotateX = 10;
                        rotateY = -40;
                        break;
                    case 'gamma3':
                        rotateX = 15;
                        rotateY = -35;
                        break;
                    case 'gamma2':
                         rotateX = 20;
                         rotateY = -30;
                         break;
                    case 'aethyr1':
                         rotateX = 25;
                         rotateY = -25;
                         break;
                    case 'genesis':
                         rotateX = 30;
                         rotateY = -20;
                         break;
                }

                container.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            // Optional: Add a reset on double click or click outside
             layer.addEventListener('dblclick', () => {
                 layers.forEach(l => {
                     l.classList.remove('is-active');
                     l.classList.remove('is-inactive');
                 });
                 // Reset container rotation to initial state
                 container.style.transform = 'rotateX(20deg) rotateY(-30deg)';
             });
        });

        // Optional: Add a click listener to the body to reset if clicking outside layers
        document.body.addEventListener('click', (event) => {
             if (!event.target.closest('.aethyr-layer') && event.target.id !== 'aethyrContainer') {
                 layers.forEach(l => {
                     l.classList.remove('is-active');
                     l.classList.remove('is-inactive');
                 });
                 // Reset container rotation to initial state
                 container.style.transform = 'rotateX(20deg) rotateY(-30deg)';
             }
        });

         // Prevent double click from zooming on touch devices
         document.addEventListener('dblclick', function(e){
             e.preventDefault();
         }, { passive: false });


    </script>

</body>
</html>
